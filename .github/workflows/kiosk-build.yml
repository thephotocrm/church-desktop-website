name: Build Kiosk App

on:
  workflow_dispatch:
  push:
    tags:
      - 'kiosk-v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: kiosk-app/src-tauri -> target

      - name: Install dependencies
        working-directory: kiosk-app
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: kiosk-app
          tagName: kiosk-v__VERSION__
          releaseName: 'Church Kiosk v__VERSION__'
          releaseBody: 'Download the Church Kiosk app for your platform.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
